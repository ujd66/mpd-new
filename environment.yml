name: mpd-splines-public
channels:
  - conda-forge
dependencies:
  # --- Core (strict constraints) ---
  - python=3.9
  - pip>=24
  - setuptools
  - wheel

  # --- System / robotics libs (conda-forge) ---
  - cmake
  - ninja
  - eigen
  - boost
  - assimp
  - octomap
  - qhull
  - tinyxml2
  - urdfdom
  - urdfdom_headers
  - console_bridge

  # Pinocchio stack pinned to a py39-compatible era (avoids solver selecting newer py310+ builds)
  - pinocchio=3.1.*
  - hpp-fcl=2.4.*

  - ffmpeg

  # Linux toolchain (repo is Ubuntu-focused; keep as in original)
  - gcc_linux-64=12
  - gxx_linux-64=12

  - pip:
      # --- PyTorch (MUST be explicit) ---
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.7.0+cu128
      - torchvision==0.22.0+cu128
      - torchaudio==2.7.0+cu128

      # --- Numpy (avoid >=2.0 for legacy API safety) ---
      - numpy>=1.26,<2.0

      # --- Original repo pip deps (kept close; removed known torch-2.7 conflicts) ---
      - absl-py==2.1.0
      - antlr4-python3-runtime==4.9.3
      - black==24.8.0
      - cachetools==5.3.3
      - castxml==0.4.5
      - catkin-pkg==1.0.0
      - certifi==2022.12.7
      - cfgv==3.4.0
      - charset-normalizer==2.1.1
      - cholespy==1.0.0
      - click==8.1.7
      - colour==0.1.5
      - ConfigArgParse==1.7
      - Cython==3.0.11
      - decorator==4.4.2
      - dirsync==2.2.5
      - distlib==0.3.9
      - distro==1.9.0
      - docker-pycreds==0.4.0
      - docutils==0.20.1
      - dotmap==1.3.30
      - einops==0.8.0
      - -e ./deps/experiment_launcher
      - filelock>=3.13.1
      - freetype-py==2.4.0
      - fsspec==2024.6.1
      - gdown==3.10.1
      - ghalton==0.6.2
      - gitdb==4.0.11
      - GitPython==3.1.43
      - google-auth==2.32.0
      - google-auth-oauthlib==1.0.0
      - grpcio==1.64.1
      - h5py==3.11.0
      - hpack==4.0.0
      - huggingface-hub==0.23.4
      - hydra-core==1.3.2
      - identify==2.6.1
      - idna==3.4
      - imageio==2.34.2
      - imageio-ffmpeg==0.5.1
      - importlib_metadata==8.0.0
      - imutils==0.5.4
      - -e ./deps/isaacgym/python
      - Jinja2==3.1.3
      - joblib==1.4.2
      - lxml==5.2.2
      - Markdown==3.6
      - mesh-to-sdf==0.0.15
      - moviepy==1.0.3
      - -e ./mpd/motion_planning_baselines
      - -e ./
      - mpmath==1.3.0
      - mypy_extensions==1.1.0
      - networkx
      - nodeenv==1.9.1
      - oauthlib==3.2.2
      - omegaconf==2.3.0
      - opencv-contrib-python==4.10.0.84
      - pandas==2.0.3
      - paramz==0.9.6
      - pathspec==0.12.1
